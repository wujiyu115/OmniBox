<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #1a1a1a; }
    .dark body { background: #1f2937; color: #f3f4f6; }
    .dark .row { border-color: #374151; }
    .dark .label { color: #9ca3af; }
    .dark .textarea-box { background: #374151; border-color: #4b5563; color: #f3f4f6; }
    .dark .btn { background: #374151; border-color: #4b5563; color: #d1d5db; }
    .dark .btn:hover { background: #4b5563; }
    .dark .btn-active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .dark .btn-copy { background: #3b82f6; border-color: #3b82f6; }
    .dark .result-box { background: #374151; border-color: #4b5563; color: #f3f4f6; }
    .dark .error-box { background: rgba(127,29,29,0.3); border-color: #991b1b; color: #f87171; }
    .dark .hint-text { color: #6b7280; }
    .dark .loading-text { color: #60a5fa; }

    .container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; gap: 12px; }
    .label { font-size: 14px; color: #6b7280; width: 48px; flex-shrink: 0; }
    .lang-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn { padding: 4px 12px; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; font-size: 14px; background: #f3f4f6; color: #4b5563; }
    .btn:hover { background: #e5e7eb; }
    .btn-active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .btn-clear { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; font-size: 14px; background: #f9fafb; color: #6b7280; }
    .btn-clear:hover { background: #f3f4f6; }

    .input-area { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
    .input-row { display: flex; align-items: flex-start; gap: 8px; }
    .textarea-box { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; outline: none; font-size: 14px; resize: none; min-height: 100px; }
    .textarea-box:focus { border-color: #3b82f6; }

    .result-section { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .result-label { font-size: 14px; color: #6b7280; }
    .loading-text { font-size: 12px; color: #3b82f6; }
    .result-box { padding: 12px; background: #f9fafb; border-radius: 6px; border: 1px solid #e5e7eb; font-size: 14px; line-height: 1.6; min-height: 80px; white-space: pre-wrap; position: relative; }
    .btn-copy { position: absolute; top: 8px; right: 8px; padding: 4px 8px; background: #3b82f6; border: 1px solid #3b82f6; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn-copy:hover { background: #2563eb; }
    .error-box { padding: 12px; background: #fef2f2; border-radius: 6px; border: 1px solid #fecaca; font-size: 14px; color: #ef4444; }
    .hint-text { color: #9ca3af; font-size: 14px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 96px; gap: 8px; color: #9ca3af; }
    .empty-icon { font-size: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 语言对选择 -->
    <div class="row">
      <span class="label">语言对</span>
      <div class="lang-buttons" id="langButtons"></div>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <div class="input-row">
        <span class="label" style="padding-top:8px;">原文</span>
        <textarea id="inputText" class="textarea-box" placeholder="输入要翻译的文本，500ms 后自动翻译..." rows="4"></textarea>
        <button class="btn-clear" onclick="clearAll()">清空</button>
      </div>
    </div>

    <!-- 结果区 -->
    <div class="result-section">
      <div class="result-header">
        <span class="result-label">译文</span>
        <span class="loading-text" id="loadingText" style="display:none;">翻译中...</span>
      </div>
      <div id="resultContent">
        <div class="empty-state">
          <span class="empty-icon">🌐</span>
          <span class="hint-text">输入文本后自动翻译（使用 MyMemory 免费 API）</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LANG_PAIRS = [
      { label: '自动 → 中文', from: 'auto', to: 'zh' },
      { label: '中文 → 英文', from: 'zh', to: 'en' },
      { label: '英文 → 中文', from: 'en', to: 'zh' },
      { label: '自动 → 英文', from: 'auto', to: 'en' },
    ];

    let currentPairIdx = 0;
    let debounceTimer = null;

    const inputText = document.getElementById('inputText');
    const langButtons = document.getElementById('langButtons');
    const loadingText = document.getElementById('loadingText');
    const resultContent = document.getElementById('resultContent');

    // 渲染语言对按钮
    function renderLangButtons() {
      langButtons.innerHTML = LANG_PAIRS.map((pair, idx) =>
        `<button class="btn ${idx === currentPairIdx ? 'btn-active' : ''}" onclick="selectLang(${idx})">${escapeHtml(pair.label)}</button>`
      ).join('');
    }

    function selectLang(idx) {
      currentPairIdx = idx;
      renderLangButtons();
      scheduleTranslate();
    }

    inputText.addEventListener('input', scheduleTranslate);

    function scheduleTranslate() {
      clearTimeout(debounceTimer);
      const text = inputText.value.trim();
      if (!text) {
        loadingText.style.display = 'none';
        resultContent.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">🌐</span>
            <span class="hint-text">输入文本后自动翻译（使用 MyMemory 免费 API）</span>
          </div>`;
        return;
      }
      loadingText.style.display = 'inline';
      debounceTimer = setTimeout(() => doTranslate(text), 500);
    }

    async function doTranslate(text) {
      const pair = LANG_PAIRS[currentPairIdx];
      const fromLang = pair.from === 'auto' ? 'autodetect' : pair.from;
      const toLang = pair.to;

      try {
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.responseStatus === 200 && data.responseData) {
          const translated = data.responseData.translatedText;
          loadingText.style.display = 'none';
          resultContent.innerHTML = `
            <div class="result-box">
              ${escapeHtml(translated)}
              <button class="btn-copy" onclick="copyResult()">复制</button>
            </div>`;
          resultContent.dataset.translated = translated;
        } else {
          throw new Error(data.responseDetails || '翻译失败');
        }
      } catch (e) {
        loadingText.style.display = 'none';
        resultContent.innerHTML = `<div class="error-box">${escapeHtml(e.message)}</div>`;
      }
    }

    function copyResult() {
      const text = resultContent.dataset.translated;
      if (text) window.omnibox.copyToClipboard(text);
    }

    function clearAll() {
      inputText.value = '';
      loadingText.style.display = 'none';
      resultContent.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🌐</span>
          <span class="hint-text">输入文本后自动翻译（使用 MyMemory 免费 API）</span>
        </div>`;
      inputText.focus();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 初始化
    renderLangButtons();

    // 生命周期钩子
    window.onPluginLoad = () => console.log('[Translate] loaded');
    window.onPluginActivate = () => inputText.focus();
    window.onPluginDeactivate = () => {};
    window.onPluginUnload = () => {};
  </script>
</body>
</html>
